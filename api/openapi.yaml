openapi: 3.0.0
info:
  title: Shortly API
  version: 1.0.0
  description: URL Shortener service with analytics

servers:
  - url: http://localhost:9000/api/v1
    description: Local server

tags:
  - name: urls
    description: URL shortener operations
    # todo: redirect tag

    # todo: statistics tag

    # todo: metrics tag

    # todo: health tag

paths:
  /shorten:
    post:
      summary: Create short URL
      description: Creates a shortened version of the provided URL
      operationId: createShortURL
      tags:
        - urls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateURLRequest"
      responses:
        '201':
          description: URL shortened successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateURLResponse"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
# todo: redirect endpoint

# todo: stats endpoint

components:
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
          example: "Invalid URL format"
    
    CreateURLRequest:
      type: object
      required:
        - url
        - expiresAt
      properties:
        url:
          type: string
          format: uri
          description: Original URL to shorten
          example: "https://google.com"
        customKey:
          type: string
          default: ""
          minLength: 3
          maxLength: 10
          pattern: '^[a-zA-Z0-9]+$'
          description: Optional custom short code
          example: "google"
        expiresAt:
          type: string
          format: date-time
          description: Expiration date
          example: "2027-02-26T19:26:30Z"
          x-go-type: time.Time
    
    CreateURLResponse:
      type: object
      required:
        - shortURL
        - originalURL
        - createdAt
        - expiresAt
      properties:
        shortURL:
          type: string
          description: Shorted URL
          example: "https://localhost:9000/abs123"
        originalURL:
          type: string
          format: uri
          description: Original URL
          example: "https://google.com"
        expiresAt:
          type: string
          format: date-time
          description: Expiration date time
          example: "2027-02-26T19:26:30Z"
          x-go-type: time.Time
        createdAt:
          type: string
          format: date-time
          description: Creation date time
          example: "2026-02-26T19:26:30Z"
          x-go-type: time.Time
    
    # todo: redirect objects

    # todo: statistics objects

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
